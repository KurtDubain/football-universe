name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 1'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm exec tsc -b

      - name: Changelog consistency
        env:
          CHANGELOG_BASE: ${{ github.event.pull_request.base.sha || github.event.before || '' }}
        run: pnpm changelog:check

      - name: Test
        run: pnpm test

      - name: Build and check bundle budget
        run: |
          pnpm build
          pnpm bundle:check

  browser-audit:
    runs-on: ubuntu-latest
    needs: build
    env:
      AUDIT_URL: http://127.0.0.1:4173
      AUDIT_SEED: 20260713
      AUDIT_SEASONS: ${{ github.event_name == 'pull_request' && '2' || '10' }}
      AUDIT_REPORT: /tmp/football-current-audit.json
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Build production app
        run: pnpm build

      - name: Start preview
        run: |
          pnpm exec vite preview --host 127.0.0.1 --port 4173 > /tmp/football-preview.log 2>&1 &
          for attempt in {1..30}; do
            if curl --fail --silent "$AUDIT_URL" > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/football-preview.log
          exit 1

      - name: Run current-version browser audit
        run: pnpm audit:current

      - name: Upload audit diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: current-version-browser-audit
          path: |
            /tmp/football-current-audit.json
            /tmp/football-preview.log
          if-no-files-found: ignore
